services:
  tailscale-exit:
    build: .
    container_name: tailscale-exit
    hostname: ${TS_HOSTNAME:-exit-node}
    restart: unless-stopped

    cap_add:
      - NET_ADMIN
      - SYS_MODULE

    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1

    networks:
      ipvlan-net:
        ipv4_address: ${IPVLAN_IP:-192.168.1.100}

    volumes:
      - /dev/net/tun:/dev/net/tun
      - tailscale-state:/var/lib/tailscale

    environment:
      - DIRECT_GW=${DIRECT_GW:-}
      - EXIT_GW=${EXIT_GW}
      - IFACE=eth0                    
      - IFACE_EXIT=eth0
      - LOCAL_REDIR_PORT=${LOCAL_REDIR_PORT:-}
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=${TS_STATE_DIR:-/var/lib/tailscale}
      - TS_USERSPACE=${TS_USERSPACE:-false}
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:---advertise-exit-node --netfilter-mode=off --accept-dns=false}
        

networks:
  ipvlan-net:
    driver: ipvlan
    driver_opts:
      parent: ${PARENT_IFACE:-eth0}   # 宿主机的物理网卡，必须正确
      ipvlan_mode: l2 
    ipam:
      config:
        - subnet: ${SUBNET:-192.168.1.0/24}
          gateway: ${GATEWAY:-192.168.1.1}

volumes:
  tailscale-state:
    driver: local
