services:
  tailscale-exit:
    build: .
    container_name: tailscale-exit
    hostname: exit-node
    restart: unless-stopped

    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1

    # Host networking is required so the container can manipulate the host's
    # multi-gateway routing tables directly.
    network_mode: host

    volumes:
      - /dev/net/tun:/dev/net/tun
      - tailscale-state:/var/lib/tailscale

    environment:
      # === Custom Split-Gateway Config ===
      - DIRECT_GW=192.168.1.1        # tailscaled own traffic (STUN/Control/DERP)
      - EXIT_GW=192.168.1.2          # exit-node forwarded traffic (required)
      # - IFACE=eth0                 # Auto-detected; set explicitly if needed
      # - IFACE_EXIT=eth1            # Defaults to IFACE if omitted
      # - LOCAL_REDIR_PORT=12345     # Optional local transparent proxy port

      # === Native containerboot Env Vars ===
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-exit-node --netfilter-mode=off --accept-dns=false

volumes:
  tailscale-state:
