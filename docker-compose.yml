services:
  tailscale-exit:
    build: .
    container_name: tailscale-exit
    hostname: ${TS_HOSTNAME:-exit-node}
    restart: unless-stopped

    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1

    network_mode: host

    volumes:
      - /dev/net/tun:/dev/net/tun
      - tailscale-state:/var/lib/tailscale

    environment:
      # === Split-Gateway Routing (override in Dokploy UI) ===
      # Gateway for tailscaled own traffic (STUN/Control/DERP). Leave empty to keep host default.
      - DIRECT_GW=${DIRECT_GW:-}

      # Gateway for exit-node forwarded traffic (required).
      - EXIT_GW=${EXIT_GW}

      # Network interface. Auto-detected if omitted.
      - IFACE=${IFACE:-}

      # Interface for exit-node gateway. Defaults to IFACE.
      - IFACE_EXIT=${IFACE_EXIT:-${IFACE:-}}

      # Optional local transparent proxy port (e.g., 12345).
      - LOCAL_REDIR_PORT=${LOCAL_REDIR_PORT:-}

      # === Tailscale containerboot Settings ===
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=${TS_STATE_DIR:-/var/lib/tailscale}
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:---advertise-exit-node --netfilter-mode=off --accept-dns=false}

volumes:
  tailscale-state:
